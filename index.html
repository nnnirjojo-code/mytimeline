<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2F0ED">
  <title>我的手账</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #F2F0ED;
      --bg-card: #FFFFFF;
      --bg-detail: #F5F5F5;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-muted: #A8A8A8;
      --accent: #E87A5D;
      --accent-light: #F5E6E0;
      --accent-dark: #D06A4F;
      --border: #EEEEEE;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 1px 4px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 6px 20px rgba(0,0,0,0.04);
      --shadow-xl: 0 24px 64px rgba(0,0,0,0.12), 0 12px 32px rgba(0,0,0,0.06);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 8px;
      --font-sans: 'Inter', -apple-system, -apple-system, sans-serif;
      --font-serif: 'Noto Serif SC', serif;
      --tag-bg: #F5E6E0;
      --tag-fg: #E87A5D;
      --tag-border: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      user-select: none;
    }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ===== 屏幕切换 ===== */
    .screen {
      position: fixed; inset: 0;
      overflow: hidden;
      transition: opacity 0.35s ease, transform 0.35s ease;
      will-change: transform, opacity;
      background: var(--bg);
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: translateX(24px); }
    .screen.slide-left { transform: translateX(-24px); opacity: 0; pointer-events: none; }

    /* ===== 顶部导航 ===== */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 50px 20px 16px;
      background: var(--bg);
      position: relative;
      z-index: 5;
    }
    .nav-back {
      font-size: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
      border: none;
      background: transparent;
      font-family: var(--font-sans);
    }
    .nav-back:active { background: rgba(0,0,0,0.06); }
    .nav-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .nav-action {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.2s;
      border: none;
      background: transparent;
      font-family: var(--font-sans);
    }
    .nav-action:active { background: var(--accent-light); }

    /* ===== 日历页面 ===== */
    #screen-calendar {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .cal-header {
      padding: 12px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .cal-month {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .cal-year {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .month-nav { display: flex; gap: 4px; }
    .month-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      font-family: var(--font-sans);
    }
    .month-btn:active { background: var(--border); transform: scale(0.92); }

    /* ===== 星期行 ===== */
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 8px 16px 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.3px;
    }
    .cal-weekday.weekend { color: var(--accent); }

    /* ===== 日历网格 ===== */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px;
      flex: 1;
      gap: 2px 0;
    }
    .cal-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0;
      cursor: pointer;
    }
    .day-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      transition: all 0.2s;
      font-family: var(--font-sans);
    }
    .cal-day:active .day-circle { transform: scale(0.88); }
    .cal-day.has-record .day-circle {
      font-weight: 600;
      color: var(--text-primary);
    }
    .cal-day.today .day-circle {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 12px rgba(232,122,93,0.30);
    }
    .cal-day.weekend .day-circle { color: var(--accent); }
    .cal-day.weekend.has-record .day-circle { color: var(--accent); }
    .cal-day.other-month .day-circle { opacity: 0.2; }
    .cal-day.other-month { pointer-events: none; }

    .day-dots {
      display: flex;
      gap: 3px;
      margin-top: 3px;
      min-height: 6px;
    }
    .day-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .day-dot.text { background: var(--accent); opacity: 0.5; }
    .day-dot.img { background: var(--accent); opacity: 0.25; }

    /* ===== FAB ===== */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 50%;
      transform: translateX(50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 28px;
      font-weight: 300;
      box-shadow: 0 4px 16px rgba(232,122,93,0.30), 0 8px 32px rgba(232,122,93,0.12);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-family: var(--font-sans);
    }
    .fab:active {
      transform: translateX(50%) scale(0.92);
    }

    /* ===== 底部工具栏 ===== */
    .bottom-tools {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: var(--bg-card);
      padding: 6px 8px;
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      z-index: 10;
    }
    .tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
    }
    .tool-btn:active { background: var(--border); transform: scale(0.92); }
    .tool-btn.active { background: var(--accent-light); color: var(--accent); }

    /* ===== 详情/时间线 ===== */
    #screen-detail {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .detail-date-big {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .detail-date-sub {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .timeline-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 120px;
    }
    .timeline-empty {
      text-align: center;
      padding-top: 80px;
      color: var(--text-muted);
      line-height: 2.5;
    }
    .timeline-empty .empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 12px; }

    .timeline-entry {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .entry-time {
      flex-shrink: 0;
      width: 44px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: right;
      padding-top: 14px;
      font-family: var(--font-sans);
    }

    /* ===== 卡片（时间线用） ===== */
    .entry-bubble {
      flex: 1;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .entry-bubble:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }
    .entry-text-preview {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .entry-images-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .entry-thumb {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-xs);
      object-fit: cover;
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    .entry-thumb:active { transform: scale(0.95); }
    .entry-img-count {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .entry-tags-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .entry-tag-pill {
      font-size: 10px;
      font-weight: 500;
      color: var(--tag-fg);
      background: var(--tag-bg);
      padding: 2px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.2s;
      border: none;
      font-family: var(--font-sans);
    }
    .entry-tag-pill:active { opacity: 0.6; }

    /* ===== 周视图 ===== */
    #screen-week {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .week-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 120px;
    }
    .week-range {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .week-sub {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .week-nav {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .week-nav button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
      box-shadow: var(--shadow-sm);
    }
    .week-nav button:active { transform: scale(0.95); }
    .week-nav button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .day-group {
      margin-bottom: 28px;
      animation: fadeUp 0.35s ease both;
    }
    .day-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 12px;
    }
    .day-name {
      font-size: 15px;
      font-weight: 600;
    }
    .day-name.today { color: var(--accent); }
    .day-date {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .day-empty {
      font-size: 13px;
      color: var(--text-muted);
      padding: 6px 0 2px;
      font-style: italic;
    }

    .week-entry-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .week-entry-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }
    .week-entry-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .week-entry-time {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      font-family: var(--font-sans);
    }
    .week-entry-text {
      font-family: var(--font-serif);
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .week-entry-images {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .week-entry-images img {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-xs);
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .week-entry-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .week-entry-tag {
      font-size: 10px;
      font-weight: 500;
      color: var(--tag-fg);
      background: var(--tag-bg);
      padding: 1px 10px;
      border-radius: 999px;
      cursor: pointer;
      border: none;
      font-family: var(--font-sans);
    }

    /* ===== 添加页面 ===== */
    #screen-add {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .add-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .add-bubble {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .add-textarea {
      width: 100%;
      min-height: 160px;
      max-height: 260px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.8;
      color: var(--text-primary);
    }
    .add-textarea::placeholder { color: var(--text-muted); }
    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .char-count.warn { color: var(--accent); }

    .img-upload-area {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .img-add-btn {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-sm);
      border: 1.5px dashed var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 24px;
      transition: all 0.2s;
    }
    .img-add-btn:active { border-color: var(--accent); color: var(--accent); }
    .img-preview-wrap {
      position: relative;
      width: 68px;
      height: 68px;
    }
    .img-preview {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .img-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .tag-selected-row, .tag-suggest-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag-suggest-label {
      font-size: 11px;
      color: var(--text-muted);
      margin: 8px 0 6px;
    }
    .tag-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--tag-bg);
      color: var(--tag-fg);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 13px;
      font-family: var(--font-sans);
      border: none;
    }
    .tag-chip .tag-remove {
      font-size: 12px;
      opacity: 0.6;
      cursor: pointer;
    }
    .tag-chip-muted {
      background: var(--border);
      color: var(--text-secondary);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .tag-chip-muted:active { background: var(--accent-light); color: var(--accent); }
    .tag-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border);
      color: var(--text-primary);
      padding: 8px 0;
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.2s;
    }
    .tag-input:focus { border-color: var(--accent); }
    .tag-input::placeholder { color: var(--text-muted); }

    .add-footer {
      padding: 8px 16px 40px;
      background: var(--bg);
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(232,122,93,0.25);
    }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.4; }

    /* ===== 标签云 ===== */
    #screen-tagcloud {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .tagcloud-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 60px;
    }
    .tagcloud-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 20px;
      align-items: center;
      padding-top: 16px;
    }
    .tagcloud-item {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
      font-family: var(--font-sans);
    }
    .tagcloud-item:active { opacity: 0.5; }
    .tagcloud-empty {
      color: var(--text-muted);
      text-align: center;
      padding-top: 80px;
      line-height: 2.5;
    }

    /* ===== 标签时间线 ===== */
    #screen-tagtimeline {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .tagtimeline-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 60px;
    }
    .entry-date-badge {
      flex-shrink: 0;
      width: 54px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: right;
      padding-top: 14px;
      line-height: 1.5;
      font-family: var(--font-sans);
    }

    /* ===== Bottom Sheet ===== */
    .bottom-sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .bottom-sheet-overlay.open { opacity: 1; pointer-events: all; }
    .bottom-sheet {
      width: 100%;
      max-height: 75vh;
      background: var(--bg-card);
      border-radius: 20px 20px 0 0;
      padding: 20px 24px 40px;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .bottom-sheet-overlay.open .bottom-sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .sheet-time {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      font-family: var(--font-sans);
    }
    .sheet-text {
      font-family: var(--font-serif);
      font-size: 15px;
      line-height: 1.9;
      color: var(--text-primary);

    .sheet-images {
      display: flex;
      gap: 8px;

    }
    .sheet-image {
      width: calc(50% - 4px);
      border-radius: var(--radius-sm);

    }
    .sheet-delete-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(232,122,93,0.25);
      background: rgba(232,122,93,0.06);
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sheet-delete-btn:active { background: rgba(232,122,93,0.12); }

    /* ===== Lightbox ===== */
    .lightbox {
      position: fixed; inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;

      max-width: 95vw;
      max-height: 90vh;
      border-radius: var(--radius-sm);
      object-fit: contain;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: var(--bg-card);
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      font-family: var(--font-sans);
      box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== Loading ===== */
    .loading-overlay {
      position: fixed; inset: 0;
      z-index: 500;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 隐藏工具 ===== */
    .hidden-file { display: none; }

    /* ===== 响应式 ===== */
    @media (max-width: 420px) {
      .nav-bar { padding: 44px 16px 12px; }
      .cal-month { font-size: 24px; }
      .day-circle { width: 34px; height: 34px; font-size: 13px; }
      .cal-day.today .day-circle { width: 36px; height: 36px; font-size: 14px; }
      .week-range { font-size: 19px; }
    }
  </style>
</head>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
  import { getFirestore, collection, doc, addDoc, getDocs, deleteDoc, query, orderBy, where }
    from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCNq2USnHJOyM3RbouCq7b1n2VZ8GxLSSU",
    authDomain: "mytimeline-7c3b7.firebaseapp.com",
    projectId: "mytimeline-7c3b7",
    messagingSenderId: "148289157568",
    appId: "1:148289157568:web:981aa19c4b252d1f91f025",
  };

  const CLOUDINARY_CLOUD = 'drmtcucy5';
  const CLOUDINARY_PRESET = 'diaryupload';

  let db, firebaseReady = false;
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    firebaseReady = true;
  } catch(e) { console.warn('Firebase not configured, using local storage mode.'); }

  const LOCAL_KEY = 'diary_entries_v1';
  function localLoad() {
    try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]'); } catch { return []; }
  }
  function localSave(entries) { localStorage.setItem(LOCAL_KEY, JSON.stringify(entries)); }

  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = null;
  let addTargetDate = null;
  let pendingImages = [];
  let openEntryId = null;
  let cachedEntries = {};
  let pendingTags = [];
  let allTagsCache = null;
  let weekOffset = 0;

  const MONTHS_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const WEEKDAYS_ZH = ['周日','周一','周二','周三','周四','周五','周六'];

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  function todayKey() { return dateKey(today.getFullYear(), today.getMonth(), today.getDate()); }
  function fmtTime(ts) {
    const d = ts instanceof Date ? ts : new Date(ts);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function toast(msg, dur=2000) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);
  }
  function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

  async function fetchEntriesForDate(dateStr) {
    if (cachedEntries[dateStr]) return cachedEntries[dateStr];
    let entries = [];
    if (firebaseReady) {
      try {
        const q = query(collection(db, 'entries'), where('date', '==', dateStr), orderBy('ts', 'asc'));
        const snap = await getDocs(q);
        entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch(e) { console.warn(e); }
    } else {
      entries = localLoad().filter(e => e.date === dateStr).sort((a,b) => a.ts - b.ts);
    }
    cachedEntries[dateStr] = entries;
    return entries;
  }

  async function fetchAllDates() {
    const result = {};
    if (firebaseReady) {
      try {
        const snap = await getDocs(collection(db, 'entries'));
        snap.docs.forEach(d => {
          const data = d.data();
          if (!result[data.date]) result[data.date] = { hasText: false, hasImg: false };
          if (data.text) result[data.date].hasText = true;
          if (data.images && data.images.length) result[data.date].hasImg = true;
        });
      } catch(e) {}
    } else {
      localLoad().forEach(e => {
        if (!result[e.date]) result[e.date] = { hasText: false, hasImg: false };
        if (e.text) result[e.date].hasText = true;
        if (e.images && e.images.length) result[e.date].hasImg = true;
      });
    }
    return result;
  }

  async function fetchAllTags() {
    if (allTagsCache) return allTagsCache;
    const byTag = {};
    function add(entry, dateStr) {
      (entry.tags || []).forEach(tag => {
        if (!byTag[tag]) byTag[tag] = { tag, count: 0, lastTs: 0, entries: [] };
        byTag[tag].count++;
        byTag[tag].lastTs = Math.max(byTag[tag].lastTs, entry.ts);
        byTag[tag].entries.push({ ...entry, date: dateStr });
      });
    }
    if (firebaseReady) {
      try {
        const snap = await getDocs(collection(db, 'entries'));
        snap.docs.forEach(d => add({ id: d.id, ...d.data() }, d.data().date));
      } catch(e) { console.warn(e); }
    } else {
      localLoad().forEach(e => add(e, e.date));
    }
    Object.values(byTag).forEach(t => t.entries.sort((a,b) => b.ts - a.ts));
    allTagsCache = Object.values(byTag).sort((a,b) => b.count - a.count);
    return allTagsCache;
  }

  async function fetchEntriesByTag(tag) {
    const all = await fetchAllTags();
    const found = all.find(t => t.tag === tag);
    return found ? found.entries : [];
  }

  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
      method: 'POST', body: fd
    });
    if (!res.ok) throw new Error('Cloudinary upload failed');
    const data = await res.json();
    return data.secure_url;
  }

  async function saveEntry(dateStr, text, images, tags) {
    const ts = Date.now();
    const entry = { date: dateStr, ts, text, images: [], tags: tags || [] };
    if (firebaseReady) {
      try {
        const urls = [];
        for (const img of images) {
          const url = await uploadToCloudinary(img.file);
          urls.push(url);
        }
        entry.images = urls;
        const docRef = await addDoc(collection(db, 'entries'), { date: dateStr, ts, text, images: urls, tags: tags || [] });
        entry.id = docRef.id;
      } catch(e) {
        console.warn('Save failed, falling back to local:', e);
        entry.id = 'local_' + ts;
        entry.images = images.map(i => i.dataUrl);
        const all = localLoad(); all.push(entry); localSave(all);
      }
    } else {
      entry.id = 'local_' + ts;
      entry.images = images.map(i => i.dataUrl);
      const all = localLoad(); all.push(entry); localSave(all);
    }
    delete cachedEntries[dateStr];
    allTagsCache = null;
    return entry;
  }

  async function deleteEntry(entryId, dateStr) {
    if (firebaseReady && !entryId.startsWith('local_')) {
      try { await deleteDoc(doc(db, 'entries', entryId)); } catch(e) { console.warn(e); }
    } else {
      const all = localLoad().filter(e => e.id !== entryId); localSave(all);
    }
    delete cachedEntries[dateStr];
    allTagsCache = null;
  }

  // ===== CALENDAR =====
  let allDateMeta = {};
  async function renderCalendar() {
    allDateMeta = await fetchAllDates();
    renderCalendarGrid();
  }

  function renderCalendarGrid() {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    document.getElementById('calYearLabel').textContent = currentYear + '年';
    document.getElementById('calMonthLabel').textContent = MONTHS_ZH[currentMonth];

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevDays = new Date(currentYear, currentMonth, 0).getDate();
    const todayStr = todayKey();

    for (let i = firstDay - 1; i >= 0; i--) {
      grid.appendChild(makeDay(currentYear, currentMonth - 1, prevDays - i, true));
    }
    for (let d = 1; d <= daysInMonth; d++) {
      grid.appendChild(makeDay(currentYear, currentMonth, d, false));
    }
    const total = firstDay + daysInMonth;
    const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= rem; d++) {
      grid.appendChild(makeDay(currentYear, currentMonth + 1, d, true));
    }
  }

  function makeDay(year, month, day, otherMonth) {
    const dKey = dateKey(year, month, day);
    const isToday = dKey === todayKey();
    const meta = allDateMeta[dKey] || {};
    const isWeekend = [0,6].includes(new Date(year, month, day).getDay());

    const cell = document.createElement('div');
    cell.className = 'cal-day' +
      (isToday ? ' today' : '') +
      (meta.hasText || meta.hasImg ? ' has-record' : '') +
      (isWeekend ? ' weekend' : '') +
      (otherMonth ? ' other-month' : '');

    const circle = document.createElement('div');
    circle.className = 'day-circle';
    circle.textContent = day;

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    if (meta.hasText) { const d = document.createElement('div'); d.className='day-dot text'; dots.appendChild(d); }
    if (meta.hasImg) { const d = document.createElement('div'); d.className='day-dot img'; dots.appendChild(d); }

    cell.appendChild(circle);
    cell.appendChild(dots);
    if (!otherMonth) {
      cell.addEventListener('click', () => openDetail(dKey));
    }
    return cell;
  }

  // ===== WEEK VIEW =====
  function getWeekRange(offset) {
    const now = new Date();
    const dayOfWeek = now.getDay();
    const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    const base = new Date(now);
    base.setDate(now.getDate() + mondayOffset + offset * 7);
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(base);
      d.setDate(base.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function getWeekNumber(d) {
    const start = new Date(d.getFullYear(), 0, 1);
    const diff = (d - start) / 86400000;
    return Math.ceil((diff + start.getDay() + 1) / 7);
  }

  async function renderWeekView() {
    const dates = getWeekRange(weekOffset);
    const scroll = document.getElementById('weekScroll');
    scroll.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">加载中…</div>';

    const first = dates[0];
    const last = dates[6];
    document.getElementById('weekTitle').textContent =
      `${first.getMonth()+1}月${first.getDate()}日 - ${last.getMonth()+1}月${last.getDate()}日`;
    document.getElementById('weekSub').textContent = `第 ${getWeekNumber(first)} 周`;

    const dayEntries = {};
    let hasAny = false;
    for (const d of dates) {
      const key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const entries = await fetchEntriesForDate(key);
      dayEntries[key] = entries;
      if (entries.length) hasAny = true;
    }

    scroll.innerHTML = '';
    if (!hasAny) {
      scroll.innerHTML = `<div class="timeline-empty"><div class="empty-icon">📋</div><div>这周还没有记录</div></div>`;
      return;
    }

    const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    for (let i = 0; i < dates.length; i++) {
      const d = dates[i];
      const key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const entries = dayEntries[key] || [];
      const isToday = key === todayKey();

      const group = document.createElement('div');
      group.className = 'day-group';
      group.style.animationDelay = (i * 0.06) + 's';

      const header = document.createElement('div');
      header.className = 'day-header';
      header.innerHTML = `
        <span class="day-name${isToday ? ' today' : ''}">${dayNames[d.getDay()]}${isToday ? ' · 今天' : ''}</span>
        <span class="day-date">${d.getMonth()+1}月${d.getDate()}日</span>
      `;
      group.appendChild(header);

      if (entries.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'day-empty';
        empty.textContent = '— 没有记录 —';
        group.appendChild(empty);
      } else {
        entries.forEach((entry, idx) => {
          const card = document.createElement('div');
          card.className = 'week-entry-card';
          card.style.animationDelay = (idx * 0.05 + 0.1) + 's';

          const meta = document.createElement('div');
          meta.className = 'week-entry-meta';
          meta.innerHTML = `<span class="week-entry-time">${fmtTime(entry.ts)}</span>`;
          if (entry.tags && entry.tags.length) {
            entry.tags.slice(0,3).forEach(tag => {
              const pill = document.createElement('span');
              pill.className = 'week-entry-tag';
              pill.textContent = tag;
              pill.addEventListener('click', e => { e.stopPropagation(); openTagTimeline(tag); });
              meta.appendChild(pill);
            });
            if (entry.tags.length > 3) {
              const more = document.createElement('span');
              more.className = 'week-entry-tag';
              more.textContent = `+${entry.tags.length - 3}`;
              meta.appendChild(more);
            }
          }
          card.appendChild(meta);

          if (entry.text) {
            const textEl = document.createElement('div');
            textEl.className = 'week-entry-text';
            textEl.textContent = entry.text;
            card.appendChild(textEl);
          }

          if (entry.images && entry.images.length) {
            const imgRow = document.createElement('div');
            imgRow.className = 'week-entry-images';
            entry.images.slice(0,4).forEach(url => {
              const img = document.createElement('img');
              img.src = url;
              img.addEventListener('click', e => { e.stopPropagation(); openLightbox(url); });
              imgRow.appendChild(img);
            });
            if (entry.images.length > 4) {
              const more = document.createElement('span');
              more.style.cssText = 'font-size:11px;color:var(--text-muted);display:flex;align-items:center;';
              more.textContent = `+${entry.images.length - 4}`;
              imgRow.appendChild(more);
            }
            card.appendChild(imgRow);
          }

          card.addEventListener('click', () => openBottomSheet(entry, key));
          group.appendChild(card);
        });
      }
      scroll.appendChild(group);
    }
  }

  // ===== DETAIL =====
  async function openDetail(dateStr) {
    selectedDate = dateStr;
    const parts = dateStr.split('-');
    const dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
    document.getElementById('detailDateBig').textContent = `${dt.getMonth()+1}月${dt.getDate()}日`;
    document.getElementById('detailDateSub').textContent = `${dt.getFullYear()} · ${WEEKDAYS_ZH[dt.getDay()]}`;
    showScreen('screen-detail');
    await renderTimeline(dateStr);
  }

  async function renderTimeline(dateStr) {
    const scroll = document.getElementById('timelineScroll');
    scroll.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">加载中…</div>';
    const entries = await fetchEntriesForDate(dateStr);
    scroll.innerHTML = '';
    if (!entries.length) {
      scroll.innerHTML = `<div class="timeline-empty"><div class="empty-icon">✦</div><div>这天还没有记录</div></div>`;
      return;
    }
    entries.forEach((entry, i) => {
      const row = document.createElement('div');
      row.className = 'timeline-entry';
      row.style.animationDelay = (i * 0.08) + 's';

      const timeEl = document.createElement('div');
      timeEl.className = 'entry-time';
      timeEl.textContent = fmtTime(entry.ts);

      const bubble = document.createElement('div');
      bubble.className = 'entry-bubble';

      if (entry.text) {
        const textEl = document.createElement('div');
        textEl.className = 'entry-text-preview';
        textEl.textContent = entry.text;
        bubble.appendChild(textEl);
      }
      if (entry.images && entry.images.length) {
        const row2 = document.createElement('div');
        row2.className = 'entry-images-row';
        entry.images.slice(0,3).forEach(url => {
          const img = document.createElement('img');
          img.className = 'entry-thumb';
          img.src = url;
          img.addEventListener('click', e => { e.stopPropagation(); openLightbox(url); });
          row2.appendChild(img);
        });
        bubble.appendChild(row2);
        if (entry.images.length > 3) {
          const cnt = document.createElement('div');
          cnt.className = 'entry-img-count';
          cnt.textContent = `共 ${entry.images.length} 张图片`;
          bubble.appendChild(cnt);
        }
      }
      if (entry.tags && entry.tags.length) {
        bubble.appendChild(makeTagPillsRow(entry.tags));
      }
      bubble.addEventListener('click', () => openBottomSheet(entry, dateStr));

      row.appendChild(timeEl);
      row.appendChild(bubble);
      scroll.appendChild(row);
    });
  }

  // ===== TAG HELPERS =====
  function makeTagPillsRow(tags, onClickOverride) {
    const row = document.createElement('div');
    row.className = 'entry-tags-row';
    tags.forEach(tag => {
      const pill = document.createElement('button');
      pill.className = 'entry-tag-pill';
      pill.textContent = tag;
      pill.addEventListener('click', e => {
        e.stopPropagation();
        if (onClickOverride) onClickOverride(tag);
        else openTagTimeline(tag);
      });
      row.appendChild(pill);
    });
    return row;
  }

  // ===== TAG CLOUD =====
  async function openTagCloud() {
    showScreen('screen-tagcloud');
    const scroll = document.getElementById('tagCloudScroll');
    scroll.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">加载中…</div>';
    const tags = await fetchAllTags();
    scroll.innerHTML = '';
    if (!tags.length) {
      scroll.innerHTML = `<div class="tagcloud-empty"><div>还没有标签</div></div>`;
      return;
    }
    const maxCount = Math.max(...tags.map(t => t.count));
    const wrap = document.createElement('div');
    wrap.className = 'tagcloud-wrap';
    tags.forEach(t => {
      const ratio = maxCount > 1 ? t.count / maxCount : 1;
      const fontSize = 14 + ratio * 14;
      const el = document.createElement('span');
      el.className = 'tagcloud-item';
      el.style.fontSize = fontSize + 'px';
      el.textContent = t.tag;
      el.addEventListener('click', () => openTagTimeline(t.tag));
      wrap.appendChild(el);
    });
    scroll.appendChild(wrap);
  }

  // ===== TAG TIMELINE =====
  async function openTagTimeline(tag) {
    showScreen('screen-tagtimeline');
    document.getElementById('tagTimelineTitle').textContent = `# ${tag}`;
    const scroll = document.getElementById('tagTimelineScroll');
    scroll.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">加载中…</div>';
    const entries = await fetchEntriesByTag(tag);
    document.getElementById('tagTimelineSub').textContent = `${entries.length} 条`;
    scroll.innerHTML = '';
    if (!entries.length) {
      scroll.innerHTML = `<div class="timeline-empty"><div class="empty-icon">✦</div><div>这个标签下还没有记录</div></div>`;
      return;
    }
    entries.forEach((entry, i) => {
      const row = document.createElement('div');
      row.className = 'timeline-entry';
      row.style.animationDelay = (i * 0.08) + 's';
      const parts = entry.date.split('-');
      const dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
      const dateEl = document.createElement('div');
      dateEl.className = 'entry-date-badge';
      dateEl.innerHTML = `${dt.getMonth()+1}月${dt.getDate()}日<br>${fmtTime(entry.ts)}`;
      const bubble = document.createElement('div');
      bubble.className = 'entry-bubble';
      if (entry.text) {
        const textEl = document.createElement('div');
        textEl.className = 'entry-text-preview';
        textEl.textContent = entry.text;
        bubble.appendChild(textEl);
      }
      if (entry.images && entry.images.length) {
        const row2 = document.createElement('div');
        row2.className = 'entry-images-row';
        entry.images.slice(0,3).forEach(url => {
          const img = document.createElement('img');
          img.className = 'entry-thumb';
          img.src = url;
          img.addEventListener('click', e => { e.stopPropagation(); openLightbox(url); });
          row2.appendChild(img);
        });
        bubble.appendChild(row2);
      }
      if (entry.tags && entry.tags.length) {
        bubble.appendChild(makeTagPillsRow(entry.tags));
      }
      bubble.addEventListener('click', () => openBottomSheet(entry, entry.date));
      row.appendChild(dateEl);
      row.appendChild(bubble);
      scroll.appendChild(row);
    });
  }

  // ===== BOTTOM SHEET =====
  function openBottomSheet(entry, dateStr) {
    openEntryId = { id: entry.id, date: dateStr };
    document.getElementById('sheetTime').textContent = fmtTime(entry.ts);
    document.getElementById('sheetText').textContent = entry.text || '';
    const tagsRow = document.getElementById('sheetTagsRow');
    tagsRow.innerHTML = '';
    if (entry.tags && entry.tags.length) {
      tagsRow.appendChild(makeTagPillsRow(entry.tags, tag => {
        closeBottomSheet();
        openTagTimeline(tag);
      }));
    }
    const imgs = document.getElementById('sheetImages');
    imgs.innerHTML = '';
    (entry.images || []).forEach(url => {
      const img = document.createElement('img');
      img.src = url; img.className = 'sheet-image';
      img.addEventListener('click', () => openLightbox(url));
      imgs.appendChild(img);
    });
    document.getElementById('bottomSheetOverlay').classList.add('open');
  }

  function closeBottomSheet() {
    document.getElementById('bottomSheetOverlay').classList.remove('open');
  }
  document.getElementById('bottomSheetOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('bottomSheetOverlay')) closeBottomSheet();
  });

  document.getElementById('sheetDeleteBtn').addEventListener('click', async () => {
    if (!openEntryId) return;
    const { id, date } = openEntryId;
    closeBottomSheet();
    showLoading();
    await deleteEntry(id, date);
    hideLoading();
    toast('已删除');
    await renderTimeline(date);
    allDateMeta = await fetchAllDates();
    renderCalendarGrid();
  });

  // ===== LIGHTBOX =====
  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  }
  document.getElementById('lightbox').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('open');
  });

  // ===== ADD RECORD =====
  async function openAdd(dateStr) {
    addTargetDate = dateStr;
    pendingImages = [];
    pendingTags = [];
    document.getElementById('addTextarea').value = '';
    document.getElementById('charCount').textContent = '0 / 500';
    document.getElementById('charCount').classList.remove('warn');
    document.getElementById('tagInput').value = '';
    rebuildImageArea();
    rebuildTagArea();
    const parts = dateStr.split('-');
    const dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
    document.getElementById('addDateLabel').textContent =
      dateStr === todayKey() ? '今天' : `${dt.getMonth()+1}月${dt.getDate()}日`;
    showScreen('screen-add');
    setTimeout(() => document.getElementById('addTextarea').focus(), 400);
  }

  document.getElementById('addTextarea').addEventListener('input', function() {
    const len = this.value.length;
    const countEl = document.getElementById('charCount');
    countEl.textContent = len + ' / 500';
    countEl.classList.toggle('warn', len > 400);
  });

  function rebuildImageArea() {
    const area = document.getElementById('imgUploadArea');
    area.innerHTML = '';
    pendingImages.forEach((img, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'img-preview-wrap';
      const el = document.createElement('img');
      el.className = 'img-preview'; el.src = img.dataUrl;
      const rm = document.createElement('div');
      rm.className = 'img-remove'; rm.textContent = '×';
      rm.addEventListener('click', () => { pendingImages.splice(i,1); rebuildImageArea(); });
      wrap.appendChild(el); wrap.appendChild(rm);
      area.appendChild(wrap);
    });
    if (pendingImages.length < 6) {
      const btn = document.createElement('button');
      btn.className = 'img-add-btn'; btn.textContent = '＋';
      btn.addEventListener('click', () => document.getElementById('imgFileInput').click());
      area.appendChild(btn);
    }
    const input = document.createElement('input');
    input.type='file'; input.accept='image/*'; input.multiple=true;
    input.className='hidden-file'; input.id='imgFileInput';
    input.addEventListener('change', handleImageSelect);
    area.appendChild(input);
  }

  async function handleImageSelect(e) {
    const files = Array.from(e.target.files);
    const remaining = 6 - pendingImages.length;
    for (const file of files.slice(0, remaining)) {
      const dataUrl = await readFileAsDataUrl(file);
      pendingImages.push({ file, dataUrl });
    }
    rebuildImageArea();
  }

  function readFileAsDataUrl(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function addPendingTag(raw) {
    const tag = raw.trim().slice(0, 20);
    if (!tag) return;
    if (pendingTags.includes(tag)) return;
    pendingTags.push(tag);
    rebuildTagArea();
  }

  async function rebuildTagArea() {
    const selectedRow = document.getElementById('tagSelectedRow');
    selectedRow.innerHTML = '';
    pendingTags.forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.innerHTML = `<span>${tag}</span><span class="tag-remove">✕</span>`;
      chip.querySelector('.tag-remove').addEventListener('click', () => {
        pendingTags = pendingTags.filter(t => t !== tag);
        rebuildTagArea();
      });
      selectedRow.appendChild(chip);
    });

    const suggestRow = document.getElementById('tagSuggestRow');
    const suggestLabel = document.getElementById('tagSuggestLabel');
    suggestRow.innerHTML = '';
    try {
      const allTags = await fetchAllTags();
      const suggestions = allTags.map(t => t.tag).filter(t => !pendingTags.includes(t)).slice(0, 8);
      if (suggestions.length) {
        suggestLabel.style.display = 'block';
        suggestions.forEach(tag => {
          const chip = document.createElement('button');
          chip.className = 'tag-chip-muted';
          chip.textContent = tag;
          chip.addEventListener('click', () => addPendingTag(tag));
          suggestRow.appendChild(chip);
        });
      } else {
        suggestLabel.style.display = 'none';
      }
    } catch(e) {}
  }

  document.getElementById('tagInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',' || e.key === '，') {
      e.preventDefault();
      addPendingTag(e.target.value);
      e.target.value = '';
    }
  });

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const text = document.getElementById('addTextarea').value.trim();
    if (!text && !pendingImages.length) { toast('请写点什么或上传图片～'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; showLoading();
    try {
      await saveEntry(addTargetDate, text, pendingImages, pendingTags);
      allDateMeta = await fetchAllDates();
      renderCalendarGrid();
      toast('记下来了 ✦');
      if (selectedDate === addTargetDate) {
        await renderTimeline(addTargetDate);
        showScreen('screen-detail', 'left');
      } else {
        showScreen('screen-calendar', 'left');
      }
    } catch(e) {
      toast('保存失败，请重试');
      console.error(e);
    }
    hideLoading();
    btn.disabled = false;
  });

  // ===== NAVIGATION =====
  function showScreen(id, direction='right') {
    document.querySelectorAll('.screen').forEach(s => {
      if (s.id === id) { s.classList.remove('hidden','slide-left'); }
      else if (!s.classList.contains('hidden')) {
        s.classList.add(direction === 'right' ? 'slide-left' : 'hidden');
      }
    });
  }

  async function openWeekView() {
    weekOffset = 0;
    showScreen('screen-week');
    await renderWeekView();
  }

  // ===== BUTTONS =====
  document.getElementById('fabAdd').addEventListener('click', () => openAdd(todayKey()));
  document.getElementById('detailAddBtn').addEventListener('click', () => openAdd(selectedDate));
  document.getElementById('addBackBtn').addEventListener('click', () => {
    if (selectedDate) showScreen('screen-detail', 'left');
    else showScreen('screen-calendar', 'left');
  });
  document.getElementById('backBtn').addEventListener('click', () => showScreen('screen-calendar', 'left'));
  document.getElementById('weekBackBtn').addEventListener('click', () => showScreen('screen-calendar', 'left'));
  document.getElementById('tagCloudBackBtn').addEventListener('click', () => showScreen('screen-calendar', 'left'));
  document.getElementById('tagTimelineBackBtn').addEventListener('click', () => showScreen('screen-tagcloud', 'left'));

  document.getElementById('tagEntryBtn').addEventListener('click', () => openTagCloud());
  document.getElementById('weekEntryBtn').addEventListener('click', () => openWeekView());

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--; if (currentMonth < 0) { currentMonth=11; currentYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++; if (currentMonth > 11) { currentMonth=0; currentYear++; }
    renderCalendar();
  });

  document.getElementById('weekPrev').addEventListener('click', async () => { weekOffset--; await renderWeekView(); });
  document.getElementById('weekNext').addEventListener('click', async () => { weekOffset++; await renderWeekView(); });
  document.getElementById('weekToday').addEventListener('click', async () => { weekOffset = 0; await renderWeekView(); });

  // ===== INIT =====
  await renderCalendar();
</script>
</body>
</html>
