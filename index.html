                    weekMinutes += dur;
                    weekCount++;
                }
            });

            document.getElementById('todayTotal').textContent = prettyDuration(todayMinutes);
            document.getElementById('todayCount').textContent = todayCount + ' 条记录';
            document.getElementById('weekTotal').textContent = prettyDuration(weekMinutes);
            document.getElementById('weekCount').textContent = weekCount + ' 条记录';
            document.getElementById('allTotal').textContent = prettyDuration(allMinutes);
            document.getElementById('allCount').textContent = allCount + ' 条记录';
        }

        async function openStatsDetail(range) {
            const allEntries = await fetchAllEntries();
            const now = new Date();
            const todayStr = todayKey();
            const weekStart = getWeekStart();
            const weekStartStr = dateKey(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate());

            let filtered = [];
            let rangeLabel = '';
            let totalMinutes = 0;

            if (range === 'today') {
                filtered = allEntries.filter(r => r.date === todayStr);
                rangeLabel = '今日';
            } else if (range === 'week') {
                filtered = allEntries.filter(r => r.date >= weekStartStr);
                rangeLabel = '本周';
            } else {
                filtered = allEntries;
                rangeLabel = '总计';
            }

            const tagMap = {};
            filtered.forEach(r => {
                const tags = r.tags || [];
                const dur = r.duration || 0;
                totalMinutes += dur;
                if (tags.length === 0) {
                    if (!tagMap['未分类']) tagMap['未分类'] = { minutes: 0, count: 0 };
                    tagMap['未分类'].minutes += dur;
                    tagMap['未分类'].count++;
                } else {
                    tags.forEach(tag => {
                        if (!tagMap[tag]) tagMap[tag] = { minutes: 0, count: 0 };
                        tagMap[tag].minutes += dur;
                        tagMap[tag].count++;
                    });
                }
            });

            const manualTags = loadManualTags();
            manualTags.forEach(tag => {
                if (!tagMap[tag]) tagMap[tag] = { minutes: 0, count: 0 };
            });

            const items = Object.entries(tagMap).map(([label, data]) => ({ label, ...data }));
            items.sort((a, b) => b.minutes - a.minutes);

            document.getElementById('statsDetailTitle').textContent = rangeLabel + '详情';
            document.getElementById('detailRangeLabel').textContent = rangeLabel;
            document.getElementById('detailSubLabel').textContent =
                `${filtered.length} 条记录 · 总时长 ${prettyDuration(totalMinutes)}`;

            const container = document.getElementById('tagBarChart');
            const maxMin = items.length > 0 ? Math.max(...items.map(i => i.minutes), 1) : 1;

            if (items.length === 0) {
                container.innerHTML = `<div class="stats-empty">暂无数据</div>`;
                return;
            }

            let html = '';
            items.forEach(item => {
                const pct = Math.max((item.minutes / maxMin) * 100, 2);
                html += `
                    <div class="tag-bar-item" data-tag="${escapeHtml(item.label)}">
                        <span class="tag-bar-label">${escapeHtml(item.label)}</span>
                        <div class="tag-bar-track">
                            <div class="tag-bar-fill" style="height:${pct}%;"></div>
                        </div>
                        <span class="tag-bar-value">${prettyDuration(item.minutes)}</span>
                        <span class="tag-bar-count">📝${item.count}</span>
                    </div>
                `;
            });
            container.innerHTML = html;

            container.querySelectorAll('.tag-bar-item').forEach(el => {
                el.addEventListener('click', function() {
                    const tag = this.dataset.tag;
                    if (tag && tag !== '未分类') {
                        openTagTimeline(tag);
                    } else if (tag === '未分类') {
                        toast('未分类的记录，可在添加时打上标签');
                    }
                });
            });

            showScreen('screen-stats-detail');
        }

        function rebuildImageArea() {
            const area = document.getElementById('imgUploadArea');
            area.innerHTML = '';
            pendingImages.forEach((img, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'img-preview-wrap';
                const el = document.createElement('img');
                el.className = 'img-preview';
                el.src = img.dataUrl;
                const rm = document.createElement('div');
                rm.className = 'img-remove';
                rm.textContent = '×';
                rm.addEventListener('click', () => { pendingImages.splice(i, 1);
                    rebuildImageArea(); });
                wrap.appendChild(el);
                wrap.appendChild(rm);
                area.appendChild(wrap);
            });
            if (pendingImages.length < 6) {
                const btn = document.createElement('button');
                btn.className = 'img-add-btn';
                btn.textContent = '＋';
                btn.addEventListener('click', () => document.getElementById('imgFileInput').click());
                area.appendChild(btn);
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.className = 'hidden-file';
            input.id = 'imgFileInput';
            input.addEventListener('change', handleImageSelect);
            area.appendChild(input);
        }

        async function handleImageSelect(e) {
            const files = Array.from(e.target.files);
            const remaining = 6 - pendingImages.length;
            for (const file of files.slice(0, remaining)) {
                const dataUrl = await readFileAsDataUrl(file);
                pendingImages.push({ file, dataUrl });
            }
            rebuildImageArea();
        }

        function readFileAsDataUrl(file) {
            return new Promise((res, rej) => {
                const r = new FileReader();
                r.onload = () => res(r.result);
                r.onerror = rej;
                r.readAsDataURL(file);
            });
        }

        function addPendingTag(raw) {
            const tag = raw.trim().slice(0, 20);
            if (!tag) return;
            if (pendingTags.includes(tag)) return;
            pendingTags.push(tag);
            rebuildTagArea();
        }

        async function rebuildTagArea() {
            const selectedRow = document.getElementById('tagSelectedRow');
            selectedRow.innerHTML = '';
            pendingTags.forEach(tag => {
                const chip = document.createElement('span');
                chip.className = 'tag-chip';
                chip.innerHTML = `<span>${escapeHtml(tag)}</span><span class="tag-remove">✕</span>`;
                chip.querySelector('.tag-remove').addEventListener('click', () => {
                    pendingTags = pendingTags.filter(t => t !== tag);
                    rebuildTagArea();
                });
                selectedRow.appendChild(chip);
            });

            const suggestRow = document.getElementById('tagSuggestRow');
            const suggestLabel = document.getElementById('tagSuggestLabel');
            suggestRow.innerHTML = '';
            try {
                const allTags = await fetchAllTags();
                const suggestions = allTags.map(t => t.tag).filter(t => !pendingTags.includes(t)).slice(0, 8);
                const manualTags = loadManualTags().filter(t => !pendingTags.includes(t) && !suggestions.includes(t));
                const allSuggestions = [...suggestions, ...manualTags].slice(0, 10);
                if (allSuggestions.length) {
                    suggestLabel.style.display = 'block';
                    allSuggestions.forEach(tag => {
                        const chip = document.createElement('button');
                        chip.className = 'tag-chip-muted';
                        chip.textContent = tag;
                        chip.addEventListener('click', () => addPendingTag(tag));
                        suggestRow.appendChild(chip);
                    });
                } else {
                    suggestLabel.style.display = 'none';
                }
            } catch (e) {}
        }

            document.getElementById('prevMonth').addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11;
                    currentYear--; }
                renderCalendar();
            });
            document.getElementById('nextMonth').addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0;
                    currentYear++; }
                renderCalendar();
            });

            // 导航
            document.getElementById('homeAddBtn').addEventListener('click', () => openAdd(todayKey()));
            document.getElementById('detailAddBtn').addEventListener('click', () => openAdd(selectedDate));
            document.getElementById('detailBackBtn').addEventListener('click', () => showScreen('screen-home', 'left'));
            document.getElementById('addBackBtn').addEventListener('click', () => {
                if (selectedDate) showScreen('screen-detail', 'left');
                else showScreen('screen-home', 'left');
            });
            document.getElementById('weekBackBtn').addEventListener('click', () => showScreen('screen-home', 'left'));
            document.getElementById('tagCloudBackBtn').addEventListener('click', () => showScreen('screen-home', 'left'));
            document.getElementById('tagTimelineBackBtn').addEventListener('click', () => showScreen('screen-tagcloud',
                'left'));
            document.getElementById('statsBackBtn').addEventListener('click', () => showScreen('screen-home', 'left'));
            document.getElementById('statsDetailBackBtn').addEventListener('click', () => showScreen('screen-stats',
                'left'));

            // 周视图
            document.getElementById('weekViewBtn').addEventListener('click', async () => {
                weekOffset = 0;
                showScreen('screen-week');
                await renderWeekView();
            });
            document.getElementById('weekPrev').addEventListener('click', async () => { weekOffset--;
                await renderWeekView(); });
            document.getElementById('weekNext').addEventListener('click', async () => { weekOffset++;
                await renderWeekView(); });
            document.getElementById('weekToday').addEventListener('click', async () => { weekOffset = 0;
                await renderWeekView(); });

            // 标签
            document.getElementById('tagCloudBtn').addEventListener('click', openTagCloud);

            // 统计
            document.getElementById('statsBtn').addEventListener('click', async () => {
                showScreen('screen-stats');
                await renderStats();
            });
            document.getElementById('statsCardToday').addEventListener('click', () => openStatsDetail('today'));
            document.getElementById('statsCardWeek').addEventListener('click', () => openStatsDetail('week'));
            document.getElementById('statsCardAll').addEventListener('click', () => openStatsDetail('all'));

            // 导出 / 导入
            document.getElementById('exportBtn').addEventListener('click', exportData);
            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('importFileInput').click();
            });
            document.getElementById('importFileInput').addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importData(e.target.files[0]);
                }
                e.target.value = '';
            });

            // 手动添加标签
            document.getElementById('addManualTagBtn').addEventListener('click', function() {
                const input = document.getElementById('manualTagInput');
                const tag = input.value.trim();
                if (!tag) return;
                const manualTags = loadManualTags();
                if (!manualTags.includes(tag)) {
                    manualTags.push(tag);
                    saveManualTags(manualTags);
                    toast('✅ 标签已添加');
                    input.value = '';
                    renderStats();
                } else {
                    toast('⚠️ 标签已存在');
                }
            });
            document.getElementById('manualTagInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') document.getElementById('addManualTagBtn').click();
            });

            // 添加页 - 文字计数
            document.getElementById('addTextarea').addEventListener('input', function() {
                const len = this.value.length;
                const countEl = document.getElementById('charCount');
                countEl.textContent = len + ' / 500';
                countEl.classList.toggle('warn', len > 400);
            });

            // 添加页 - 标签
            document.getElementById('tagInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ',' || e.key === '，') {
                    e.preventDefault();
                    addPendingTag(this.value);
                    this.value = '';
                }
            });

            // 添加页 - 计时
            document.getElementById('timerStartBtn').addEventListener('click', startTimer);
            document.getElementById('timerStopBtn').addEventListener('click', stopTimer);

            // 添加页 - 提交
            document.getElementById('submitBtn').addEventListener('click', async () => {
                const text = document.getElementById('addTextarea').value.trim();
                if (!text && !pendingImages.length) { toast('请写点什么或上传图片～'); return; }

                const durationInput = document.getElementById('durationMinutes');
                let duration = parseFloat(durationInput.value);
                if (isNaN(duration) || duration < 0) duration = 0;

                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                showLoading();
                try {
                    await saveEntry(addTargetDate, text, pendingImages, pendingTags, duration);
                    allDateMeta = await fetchAllDates();
                    renderCalendarGrid();
                    toast('记下来了 ✦');
                    if (selectedDate === addTargetDate) {
                        await renderTimeline(addTargetDate);
                        showScreen('screen-detail', 'left');
                    } else {
                        showScreen('screen-home', 'left');
                    }
                } catch (e) {
                    toast('保存失败，请重试');
                    console.error(e);
                }
                hideLoading();
                btn.disabled = false;
            });

            // 添加页 - 图片
            document.getElementById('imgAddBtn').addEventListener('click', () => {
                document.getElementById('imgFileInput').click();
            });

            // Bottom Sheet
            document.getElementById('bottomSheetOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('bottomSheetOverlay')) closeBottomSheet();
            });
            document.getElementById('sheetDeleteBtn').addEventListener('click', async () => {
                if (!openEntryId) return;
                const { id, date } = openEntryId;
                closeBottomSheet();
                showLoading();
                await deleteEntry(id, date);
                hideLoading();
                toast('已删除');
                await renderTimeline(date);
                allDateMeta = await fetchAllDates();
                renderCalendarGrid();
            });

            // Lightbox
            document.getElementById('lightbox').addEventListener('click', () => {
                document.getElementById('lightbox').classList.remove('open');
            });

            console.log('✅ 个人管理已加载，请输入密码');
        })();
    </script>
</body>
</html>
