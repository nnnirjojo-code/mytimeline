<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>个人管理 · 手账版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-card: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-muted: #A8A8A8;
            --accent: #E87A5D;
            --accent-light: #F5E6E0;
            --border: #EEEEEE;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 4px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08), 0 6px 20px rgba(0, 0, 0, 0.04);
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-serif: 'LXGW WenKai Screen', 'Noto Serif SC', serif;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-sans);
            background:
                radial-gradient(ellipse at 20% 40%, rgba(232, 122, 93, 0.45) 0%, rgba(232, 122, 93, 0.10) 50%, transparent 70%),
                radial-gradient(ellipse at 75% 25%, rgba(255, 180, 100, 0.40) 0%, rgba(255, 180, 100, 0.08) 45%, transparent 65%),
                radial-gradient(ellipse at 60% 85%, rgba(255, 140, 120, 0.35) 0%, rgba(255, 140, 120, 0.06) 45%, transparent 60%),
                radial-gradient(ellipse at 90% 70%, rgba(232, 122, 93, 0.20) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 80%, rgba(255, 200, 150, 0.25) 0%, transparent 50%),
                #F5F0EA;
            background-attachment: fixed;
            color: var(--text-primary);
            cursor: auto;
        }

        /* ===== 密码锁屏 ===== */
        #lockScreen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(232, 122, 93, 0.30) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(255, 200, 150, 0.20) 0%, transparent 50%),
                #F5F0EA;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }
        #lockScreen.hidden {
            display: none;
        }
        .lock-box {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px 32px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.50);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }
        .lock-box .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .lock-box h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .lock-box p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        .lock-box input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            font-size: 16px;
            font-family: var(--font-sans);
            background: rgba(255, 255, 255, 0.60);
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
            letter-spacing: 4px;
        }
        .lock-box input:focus {
            border-color: var(--accent);
        }
        .lock-box .error {
            color: #E87A5D;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .lock-box button {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(232, 122, 93, 0.25);
        }
        .lock-box button:active {
            transform: scale(0.97);
        }

        /* ===== 屏幕 ===== */
        .screen {
            position: fixed;
            inset: 0;
            overflow: hidden;
            transition: opacity 0.35s ease, transform 0.35s ease;
            will-change: transform, opacity;
            background: transparent;
            z-index: 1;
        }
        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(24px);
        }
        .screen.slide-left {
            transform: translateX(-24px);
            opacity: 0;
            pointer-events: none;
        }

        /* ===== 导航 ===== */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 44px 20px 12px;
            background: transparent;
            position: relative;
            z-index: 5;
        }
        .nav-back {
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
            border: none;
            background: transparent;
            font-family: var(--font-sans);
        }
        .nav-back:active {
            background: rgba(0, 0, 0, 0.06);
        }
        .nav-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            text-shadow: 0 1px 8px rgba(255, 255, 255, 0.30);
        }
        .nav-action {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(232, 122, 93, 0.15);
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(8px);
            font-family: var(--font-sans);
            box-shadow: 0 2px 8px rgba(232, 122, 93, 0.06);
            transition: all 0.2s;
        }
        .nav-action:active {
            transform: scale(0.95);
        }

        /* ============================================================
           主页: 左右分栏 (桌面) / 上下排列 (手机)
           ============================================================ */
        #screen-home {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }

        .home-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 16px 100px;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
        }

        .home-grid {
            display: flex;
            gap: 20px;
            align-items: stretch;
            max-width: 1400px;
            margin: 0 auto;
        }
        .home-col-left {
            flex: 0 0 58%;
            min-width: 0;
        }
        .home-col-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.50);
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        .card-glass:hover {
            box-shadow: var(--shadow-md);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }
        .card-header i {
            color: var(--accent);
            font-style: normal;
            font-size: 1.1rem;
        }

        /* ===== 省脑子 ===== */
        .reminder-textarea {
            width: 100%;
            min-height: 64px;
            padding: 10px 14px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            background: rgba(255, 255, 255, 0.40);
            font-family: var(--font-serif);
            line-height: 1.6;
            transition: border-color 0.2s;
        }
        .reminder-textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.70);
        }
        .reminder-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .reminder-footer button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-family: var(--font-sans);
        }
        .reminder-footer button:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        /* ===== 番茄钟 ===== */
        .pomo-display {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }
        .pomo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .pomo-controls button {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            font-family: var(--font-sans);
        }
        .pomo-controls button.primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px rgba(232, 122, 93, 0.25);
        }
        .pomo-controls button.primary:hover {
            background: #d46a4f;
        }
        .pomo-controls button:hover {
            background: rgba(0, 0, 0, 0.08);
        }
        .pomo-status {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== Todo ===== */
        .todo-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .todo-input-group input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
            background: rgba(255, 255, 255, 0.40);
            transition: 0.15s;
            font-family: var(--font-sans);
        }
        .todo-input-group input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.70);
        }
        .todo-input-group button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 18px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            white-space: nowrap;
        }
        .todo-input-group button:hover {
            background: #d46a4f;
        }
        .todo-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .todo-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .todo-list li:last-child {
            border-bottom: none;
        }
        .todo-list li input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }
        .todo-list li .todo-text {
            flex: 1;
            word-break: break-word;
            font-size: 0.9rem;
            font-family: var(--font-serif);
        }
        .todo-list li .todo-text.done {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .todo-list li .delete-todo {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 6px;
            border-radius: 6px;
            transition: 0.15s;
        }
        .todo-list li .delete-todo:hover {
            color: #ef4444;
        }
        .todo-empty {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 12px 0;
        }

        /* ===== 日历 ===== */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .cal-left {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .cal-month {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .cal-year {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .month-nav {
            display: flex;
            gap: 4px;
        }
        .month-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.50);
            background: rgba(255, 255, 255, 0.40);
            backdrop-filter: blur(8px);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }
        .month-btn:active {
            transform: scale(0.92);
        }
        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 6px 0 2px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.3px;
        }
        .cal-weekday.weekend {
            color: var(--accent);
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px 0;
        }
        .cal-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 0 2px;
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.15s;
        }
        .cal-day:active {
            background: rgba(0, 0, 0, 0.03);
        }
        .day-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        @media (hover: hover) {
            .cal-day:hover .day-circle {
                transform: scale(1.08);
                box-shadow: 0 0 20px rgba(232, 122, 93, 0.15);
            }
        }
        .cal-day.has-record .day-circle {
            font-weight: 600;
            color: var(--text-primary);
        }
        .cal-day.today .day-circle {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(232, 122, 93, 0.40);
        }
        .cal-day.weekend .day-circle {
            color: var(--accent);
        }
        .cal-day.other-month .day-circle {
            opacity: 0.2;
        }
        .cal-day.other-month {
            pointer-events: none;
        }
        .day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin-top: 1px;
            background: var(--accent);
            opacity: 0.5;
        }
        .cal-day.today .day-dot {
            background: #fff;
            opacity: 0.8;
        }

        .home-tools {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }
        .home-tools button {
            background: rgba(255, 255, 255, 0.40);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.50);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-sans);
        }
        .home-tools button:active {
            transform: scale(0.95);
        }
        .home-tools button.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(232, 122, 93, 0.12);
        }

        /* ============================================================
           时间轴 (详情页)
           ============================================================ */
        #screen-detail {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }
        #screen-detail .timeline-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 120px;
            position: relative;
            z-index: 1;
            -webkit-overflow-scrolling: touch;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 12px 18px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.50);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-bar .left {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .stats-bar .date {
            font-size: 18px;
            font-weight: 700;
        }
        .stats-bar .weekday {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .stats-bar .right {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .stats-bar .right strong {
            color: var(--accent);
            font-weight: 600;
        }

        .time-section {
            margin-bottom: 20px;
        }
        .time-section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            padding: 0 4px 6px;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.30);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.30);
            font-family: var(--font-sans);
        }

        .entry {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            animation: fadeUp 0.35s ease both;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .entry-left {
            flex-shrink: 0;
            width: 44px;
            text-align: right;
            padding-top: 12px;
        }
        .entry-time {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            font-family: var(--font-sans);
        }
        .entry-index {
            font-size: 9px;
            color: #C8C8C8;
            font-weight: 500;
            display: block;
            margin-top: 2px;
            font-family: var(--font-sans);
        }

        .entry-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 13px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.50);
            cursor: pointer;
            transition: all 0.2s;
        }
        .entry-card:active {
            transform: scale(0.97);
        }
        .entry-card.has-image {
            padding: 0 0 12px 0;
            border-color: rgba(232, 122, 93, 0.15);
            box-shadow: var(--shadow-md);
        }
        .entry-card.has-image .card-inner {
            padding: 13px 16px 0;
        }
        .entry-card.has-image .entry-images {
            padding: 0 16px;
            margin-top: 10px;
        }
        .entry-card.first-of-day {
            border-left: 4px solid var(--accent);
            border-radius: 14px 14px 14px 4px;
        }

        .entry-text {
            font-family: var(--font-serif);
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        .entry-text .hl {
            color: var(--accent);
            font-weight: 500;
        }
        .entry-text.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .expand-btn {
            font-size: 12px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 0 0;
            font-family: var(--font-sans);
        }

        .entry-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .entry-tag {
            font-size: 10px;
            font-weight: 500;
            color: var(--accent);
            background: rgba(232, 122, 93, 0.12);
            padding: 1px 10px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-family: var(--font-sans);
        }
        .entry-tag:active {
            opacity: 0.6;
        }

        .entry-images {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .entry-images img {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-xs);
            object-fit: cover;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .first-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(232, 122, 93, 0.12);
            padding: 1px 10px;
            border-radius: 999px;
            margin-bottom: 4px;
            font-family: var(--font-sans);
        }

        .empty-state-enhanced {
            text-align: center;
            padding: 60px 20px 40px;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(12px);

        .day-card {

        .day-card-header {

        .day-card-name.weekend {
            color: var(--accent);

        .day-card-number {

            font-weight: 700;
            letter-spacing: -0.5px;

        .day-card-badge {

        .day-card-body {
            padding: 12px 16px 14px;

        .day-card-empty {

            color: var(--text-muted);
            font-style: italic;

            font-family: var(--font-serif);

            margin-bottom: 4px;

            font-family: var(--font-sans);

            flex-wrap: wrap;

        .day-entry-tag {

        .day-entry-text {

            line-height: 1.7;

        .day-entry-images .more-badge {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            background: var(--border);

            font-weight: 600;

        /* ============================================================

        .img-upload-area {
            display: flex;

            flex-wrap: wrap;
        }
        .img-add-btn {
            width: 64px;

            border-radius: var(--radius-sm);

            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 22px;
            transition: all 0.2s;
            font-family: var(--font-sans);
        }
        .img-add-btn:active {
            border-color: var(--accent);

        }
        .img-preview-wrap {

            width: 64px;
            height: 64px;
        }
        .img-preview {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--border);
        }
        .img-remove {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);

            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);

        .tag-selected-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;

        .tag-suggest-row {

            gap: 5px;

            padding: 3px 12px;
            font-size: 13px;
            font-family: var(--font-sans);
            border: none;
        }
        .tag-chip .tag-remove {
            font-size: 12px;
            opacity: 0.6;
            cursor: pointer;
        }
        .tag-chip-muted {
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 3px 12px;
            font-size: 13px;
            font-family: var(--font-sans);
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .tag-chip-muted:active {
            background: rgba(232, 122, 93, 0.12);
            color: var(--accent);
        }
        .tag-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(0, 0, 0, 0.06);
            color: var(--text-primary);
            padding: 6px 0;
            font-size: 14px;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color 0.2s;
        }
        .tag-input:focus {
            border-color: var(--accent);
        }
        .tag-input::placeholder {
            color: var(--text-muted);
        }

            flex-wrap: wrap;
            margin-top: 6px;

            width: 80px;
            padding: 6px 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 30px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.40);
            font-family: var(--font-sans);
            outline: none;
            transition: border-color 0.2s;
        }
        .timer-row input[type="number"]:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.70);
        }
        .timer-row .timer-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: var(--font-sans);
        }
        .timer-row .timer-display {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 56px;
            letter-spacing: 0.5px;
        }
        .timer-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-sans);
            transition: 0.15s;
        }
        .timer-btn:hover {
            background: rgba(0, 0, 0, 0.08);

        .timer-btn.primary {
            background: var(--accent);
            color: #fff;

            background: #d46a4f;

            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(232, 122, 93, 0.25);

            transform: scale(0.97);
        }
        .submit-btn:disabled {
            opacity: 0.4;
        }
        .hidden-file {

        /* ============================================================
           统计页 (新 UI)
           ============================================================ */
        #screen-stats .stats-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 100px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .stats-summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .stats-summary-card {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 22px 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.50);
            box-shadow: var(--shadow-sm);
            text-align: center;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .stats-summary-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .stats-summary-card:active {
            transform: scale(0.96);
        }
        .stats-summary-card .summary-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            font-family: var(--font-sans);
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        .stats-summary-card .summary-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-sans);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .stats-summary-card .summary-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-sans);
            margin-top: 4px;
        }
        .stats-summary-card .summary-hint {
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 6px;
            font-family: var(--font-sans);
        }
        .stats-summary-card:nth-child(1) .summary-value {
            color: var(--accent);
        }
        .stats-summary-card:nth-child(2) .summary-value {
            color: #4A9E8E;
        }
        .stats-summary-card:nth-child(3) .summary-value {
            color: #5B7FBF;
        }
        .stats-summary-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .stats-summary-card:nth-child(1)::after {
            background: var(--accent);
        }
        .stats-summary-card:nth-child(2)::after {
            background: #4A9E8E;
        }
        .stats-summary-card:nth-child(3)::after {
            background: #5B7FBF;
        }

        .add-tag-row {

            gap: 8px;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }
        .add-tag-row input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 30px;
            font-size: 0.85rem;
            outline: none;
            background: rgba(255, 255, 255, 0.40);
            font-family: var(--font-sans);
            transition: border-color 0.2s;
        }
        .add-tag-row input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.70);
        }
        .add-tag-row button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            transition: background 0.15s;
            white-space: nowrap;
        }
        .add-tag-row button:hover {
            background: #d46a4f;
        }

            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 100px;
            position: relative;
            z-index: 1;
        }

            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 4px;
        }

            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-sans);
        }
        .stats-detail-header .sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-sans);
        }

        .tag-bar-chart {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 4px 0 20px;

        }

        .tag-bar-item {
            display: flex;

            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: background 0.15s;

            background: rgba(0, 0, 0, 0.02);

            background: rgba(0, 0, 0, 0.04);

        .tag-bar-label {
            min-width: 52px;
            font-size: 0.85rem;

            color: var(--text-secondary);
            font-family: var(--font-sans);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        .tag-bar-track {
            flex: 1;

            background: #4A9E8E;
        }
        .tag-bar-item:nth-child(3) .tag-bar-fill {
            background: #5B7FBF;
        }
        .tag-bar-item:nth-child(4) .tag-bar-fill {
            background: #D4A373;
        }
        .tag-bar-item:nth-child(5) .tag-bar-fill {
            background: #B5838D;
        }
        .tag-bar-item:nth-child(6) .tag-bar-fill {
            background: #6D597A;
        }
        .tag-bar-item:nth-child(7) .tag-bar-fill {
            background: #B56576;
        }
        .tag-bar-item:nth-child(8) .tag-bar-fill {
            background: #355070;
        }

        .tag-bar-value {
            min-width: 52px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: left;
            font-family: var(--font-sans);
        }
        .tag-bar-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            min-width: 36px;
            text-align: left;
            font-family: var(--font-sans);
        }

        .stats-empty {
            color: var(--text-muted);
            padding: 30px 0;
            text-align: center;
            font-size: 0.9rem;
            font-family: var(--font-sans);
        }

        /* ============================================================
           Bottom Sheet / Lightbox / Toast / Loading
           ============================================================ */
        .bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.30);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(8px);
        }
        .bottom-sheet-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .bottom-sheet {
            width: 100%;
            max-height: 75vh;
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            padding: 20px 24px 40px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            border-top: 1px solid rgba(255, 255, 255, 0.50);
        }
        .bottom-sheet-overlay.open .bottom-sheet {
            transform: translateY(0);
        }
        .sheet-handle {
            width: 36px;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .sheet-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .sheet-text {
            font-family: var(--font-serif);
            font-size: 15px;
            line-height: 1.9;
            color: var(--text-primary);
            margin-top: 8px;
        }
        .sheet-tags-row {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .sheet-tag {
            font-size: 10px;
            font-weight: 500;
            color: var(--accent);
            background: rgba(232, 122, 93, 0.12);
            padding: 2px 10px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-family: var(--font-sans);
        }
        .sheet-images {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .sheet-image {
            width: calc(50% - 4px);
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .sheet-delete-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(232, 122, 93, 0.25);
            background: rgba(232, 122, 93, 0.06);
            color: var(--accent);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .sheet-delete-btn:active {
            background: rgba(232, 122, 93, 0.12);
        }
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .lightbox.open {
            opacity: 1;
            pointer-events: all;
        }
        .lightbox img {
            max-width: 95vw;
            max-height: 90vh;
            border-radius: var(--radius-sm);
            object-fit: contain;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
            font-family: var(--font-sans);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(255, 255, 255, 0.40);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .loading-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(0, 0, 0, 0.04);
            border-top-color: var(--accent);
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .home-grid {
                flex-direction: column;
                gap: 14px;
            }
            .home-col-left,
            .home-col-right {
                flex: none;
                width: 100%;
            }
            .home-col-right {
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .pomo-display {
                font-size: 2.2rem;
            }
            .cal-month {
                font-size: 18px;
            }
            .day-circle {
                width: 30px;
                height: 30px;
                font-size: 12px;
            }
            .cal-day.today .day-circle {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }
            .nav-bar {
                padding: 36px 16px 10px;
            }
            .home-scroll {
                padding: 0 12px 80px;
            }
            .card-glass {
                padding: 14px 16px;
            }
            .todo-list {
                max-height: 150px;
            }
            .reminder-textarea {
                min-height: 48px;
                font-size: 0.9rem;
            }
            .stats-summary-row {
                gap: 8px;
            }
            .stats-summary-card {
                padding: 14px 8px 12px;
            }
            .stats-summary-card .summary-value {
                font-size: 1.5rem;
            }
            .tag-bar-item {
                gap: 8px;
            }
            .tag-bar-label {
                min-width: 36px;
                font-size: 0.7rem;
            }
            .tag-bar-value {
                min-width: 36px;
                font-size: 0.7rem;
            }
            .tag-bar-track {
                height: 32px;
            }
            .tag-bar-count {
                min-width: 28px;
                font-size: 0.6rem;
            }
            #screen-week .week-scroll {
                padding: 8px 12px 100px;
            }
        }

        @media (max-width: 420px) {
            .nav-bar {
                padding: 28px 12px 8px;
            }
            .nav-title {
                font-size: 16px;
            }
            .home-scroll {
                padding: 0 8px 70px;
            }
            .card-glass {
                padding: 12px 14px;
                border-radius: 14px;
            }
            .pomo-display {
                font-size: 1.8rem;
            }
            .pomo-controls button {
                padding: 4px 12px;
                font-size: 0.75rem;
            }
            .day-circle {
                width: 28px;
                height: 28px;
                font-size: 11px;
            }
            .cal-day.today .day-circle {
                width: 30px;
                height: 30px;
                font-size: 12px;
            }
            .cal-month {
                font-size: 16px;
            }
            .cal-year {
                font-size: 11px;
            }
            .todo-input-group input {
                font-size: 0.8rem;
                padding: 6px 10px;
            }
            .todo-input-group button {
                font-size: 0.75rem;
                padding: 0 14px;
            }
            .todo-list li .todo-text {
                font-size: 0.8rem;
            }
            .add-textarea {
                min-height: 100px;
                font-size: 14px;
            }
            .lock-box {
                padding: 24px 18px 20px;
            }
            .lock-box h2 {
                font-size: 18px;
            }
            .stats-summary-card .summary-value {
                font-size: 1.2rem;
            }
            .stats-summary-card {
                padding: 10px 4px 10px;
            }
            .stats-summary-card .summary-label {
                font-size: 0.65rem;
            }
            .stats-summary-card .summary-sub {
                font-size: 0.6rem;
            }
            .stats-summary-card .summary-hint {
                display: none;
            }
            .tag-bar-label {
                min-width: 28px;
                font-size: 0.6rem;
            }
            .tag-bar-value {
                min-width: 28px;
                font-size: 0.6rem;
            }
            .tag-bar-track {
                height: 24px;
            }
            .tag-bar-count {
                min-width: 20px;
                font-size: 0.5rem;
            }
            #screen-week .week-scroll {
                padding: 8px 8px 80px;
            }
        }

        /* ===== 滚动条美化 ===== */
        .home-scroll::-webkit-scrollbar,
        .timeline-scroll::-webkit-scrollbar,
        .week-scroll::-webkit-scrollbar,
        .stats-scroll::-webkit-scrollbar,
        .stats-detail-scroll::-webkit-scrollbar,
        .tagcloud-scroll::-webkit-scrollbar,
        .tagtimeline-scroll::-webkit-scrollbar,
        .todo-list::-webkit-scrollbar,
        .add-body::-webkit-scrollbar {
            width: 4px;
        }
        .home-scroll::-webkit-scrollbar-track,
        .timeline-scroll::-webkit-scrollbar-track,
        .week-scroll::-webkit-scrollbar-track,
        .stats-scroll::-webkit-scrollbar-track,
        .stats-detail-scroll::-webkit-scrollbar-track,
        .tagcloud-scroll::-webkit-scrollbar-track,
        .tagtimeline-scroll::-webkit-scrollbar-track,
        .todo-list::-webkit-scrollbar-track,
        .add-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .home-scroll::-webkit-scrollbar-thumb,
        .timeline-scroll::-webkit-scrollbar-thumb,
        .week-scroll::-webkit-scrollbar-thumb,
        .stats-scroll::-webkit-scrollbar-thumb,
        .stats-detail-scroll::-webkit-scrollbar-thumb,
        .tagcloud-scroll::-webkit-scrollbar-thumb,
        .tagtimeline-scroll::-webkit-scrollbar-thumb,
        .todo-list::-webkit-scrollbar-thumb,
        .add-body::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.10);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ===== 密码锁屏 ===== -->
    <div id="lockScreen">
        <div class="lock-box">
            <div class="icon">🔒</div>
            <h2>个人管理</h2>
            <p>请输入密码</p>
            <input type="password" id="passwordInput" placeholder="· · · · · ·" maxlength="20" autofocus />
            <div class="error" id="lockError"></div>
            <button id="unlockBtn">解锁</button>
        </div>
    </div>

    <!-- ================================================================
    主页
    ================================================================ -->
    <div class="screen hidden" id="screen-home">
        <div class="nav-bar">
            <span></span>
            <span class="nav-title">📖 个人管理</span>
            <button class="nav-action" id="homeAddBtn">+ 记录</button>
        </div>
        <div class="home-scroll">
            <div class="home-grid">
                <div class="home-col-left">
                    <div class="card-glass" style="margin-bottom:14px;">
                        <div class="card-header"><i>📌</i> 省脑子</div>
                        <textarea class="reminder-textarea" id="reminderText" placeholder="写一句今天提醒自己的话…"></textarea>
                        <div class="reminder-footer">
                            <span>自动保存</span>
                            <button id="clearReminderBtn">清空</button>
                        </div>
                    </div>
                    <div class="card-glass">
                        <div class="cal-header">
                            <div class="cal-left">
                                <span class="cal-month" id="calMonthLabel">六月</span>
                                <span class="cal-year" id="calYearLabel">2026</span>
                            </div>
                            <div class="month-nav">
                                <button class="month-btn" id="prevMonth">‹</button>
                                <button class="month-btn" id="nextMonth">›</button>
                            </div>
                        </div>
                        <div class="cal-weekdays">
                            <div class="cal-weekday weekend">日</div>
                            <div class="cal-weekday">一</div>
                            <div class="cal-weekday">二</div>
                            <div class="cal-weekday">三</div>
                            <div class="cal-weekday">四</div>
                            <div class="cal-weekday">五</div>
                            <div class="cal-weekday weekend">六</div>
                        </div>
                        <div class="cal-grid" id="calGrid"></div>
                        <div class="home-tools">
                            <button id="weekViewBtn">📋 周视图</button>
                            <button id="tagCloudBtn">🏷️ 标签</button>
                            <button id="statsBtn">📊 统计</button>
                            <button id="exportBtn">💾 导出</button>
                            <button id="importBtn" style="font-size:0.7rem;opacity:0.6;">导入</button>
                            <input type="file" id="importFileInput" accept=".json" style="display:none;" />
                        </div>
                    </div>
                </div>
                <div class="home-col-right">
                    <div class="card-glass">
                        <div class="card-header"><i>🍅</i> 番茄钟</div>
                        <div class="pomo-display" id="pomoDisplay">25:00</div>
                        <div class="pomo-controls">
                            <button class="primary" id="pomoStartBtn">▶ 开始</button>
                            <button id="pomoPauseBtn">⏸ 暂停</button>
                            <button id="pomoResetBtn">↺ 重置</button>
                        </div>
                        <div class="pomo-status" id="pomoStatus">⏳ 准备就绪</div>
                    </div>
                    <div class="card-glass" style="flex:1;">
                        <div class="card-header"><i>✅</i> Todo</div>
                        <div class="todo-input-group">
                            <input type="text" id="todoInput" placeholder="添加任务…" />
                            <button id="addTodoBtn">添加</button>
                        </div>
                        <ul class="todo-list" id="todoList">
                            <li class="todo-empty">✨ 还没有任务</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================================================================
    详情页 (时间轴)
    ================================================================ -->
    <div class="screen hidden" id="screen-detail">
        <div class="nav-bar">
            <button class="nav-back" id="detailBackBtn">←</button>
            <span class="nav-title" id="detailDateTitle">7月1日</span>
            <button class="nav-action" id="detailAddBtn">+ 记录</button>
        </div>
        <div class="timeline-scroll" id="timelineScroll"></div>
    </div>

    <!-- ================================================================
    添加页
    ================================================================ -->
    <div class="screen hidden" id="screen-add">
        <div class="nav-bar">
            <button class="nav-back" id="addBackBtn">←</button>
            <span class="nav-title" id="addDateLabel">今天</span>
            <span></span>
        </div>
        <div class="add-body">
            <div class="add-bubble">
                <textarea class="add-textarea" id="addTextarea" placeholder="写点什么…" maxlength="500"></textarea>
                <div class="char-count" id="charCount">0 / 500</div>
            </div>
            <div class="add-bubble">
                <div class="img-upload-area" id="imgUploadArea">
                    <button class="img-add-btn" id="imgAddBtn">＋</button>
                    <input type="file" accept="image/*" multiple class="hidden-file" id="imgFileInput">
                </div>
            </div>
            <div class="add-bubble">
                <div class="tag-selected-row" id="tagSelectedRow"></div>
                <input class="tag-input" id="tagInput" placeholder="输入标签，按回车确认" maxlength="20" />
                <div class="tag-suggest-label" id="tagSuggestLabel" style="display:none;">常用标签</div>
                <div class="tag-suggest-row" id="tagSuggestRow"></div>
            </div>
            <div class="add-bubble">
                <div class="card-header"><i>⏱️</i> 计时</div>
                <div class="timer-row">
                    <input type="number" id="durationMinutes" placeholder="分钟" min="0" step="0.5" />
                    <span class="timer-label">分钟</span>
                    <span style="color:var(--text-muted);font-size:0.8rem;font-family:var(--font-sans);">或</span>
                    <button class="timer-btn primary" id="timerStartBtn">▶ 开始计时</button>
                    <button class="timer-btn" id="timerStopBtn" disabled>⏹ 停止</button>
                    <span class="timer-display" id="timerDisplay">00:00</span>
                </div>
                <div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;font-family:var(--font-sans);">
                    💡 手动填写分钟，或点击「开始计时」走表，停止后自动填入
                </div>
            </div>
        </div>
        <div class="add-footer">
            <button class="submit-btn" id="submitBtn">记下来</button>
        </div>
    </div>

    <!-- ================================================================
    周视图 (恢复原UI + 滚动修复)
    ================================================================ -->
    <div class="screen hidden" id="screen-week">
        <div class="nav-bar">
            <button class="nav-back" id="weekBackBtn">←</button>
            <span class="nav-title" id="weekTitle">本周</span>
            <span></span>
        </div>
        <div style="padding:0 20px 12px;flex-shrink:0;">
            <div class="week-sub" id="weekSub">第 0 周</div>
            <div class="week-nav">
                <button id="weekPrev">← 上周</button>
                <button class="active" id="weekToday">本周</button>
                <button id="weekNext">下周 →</button>
            </div>
        </div>
        <div class="week-scroll" id="weekScroll"></div>
    </div>

    <!-- ================================================================
    标签云
    ================================================================ -->
    <div class="screen hidden" id="screen-tagcloud">
        <div class="nav-bar">
            <button class="nav-back" id="tagCloudBackBtn">←</button>
            <span class="nav-title">🏷️ 标签</span>
            <span></span>
        </div>
        <div class="tagcloud-scroll" id="tagCloudScroll"></div>
    </div>

    <!-- ================================================================
    标签时间线
    ================================================================ -->
    <div class="screen hidden" id="screen-tagtimeline">
        <div class="nav-bar">
            <button class="nav-back" id="tagTimelineBackBtn">←</button>
            <span class="nav-title" id="tagTimelineTitle"># 标签</span>
            <span class="nav-action" id="tagTimelineSub" style="font-size:12px;font-weight:400;color:var(--text-muted);">0 条</span>
        </div>
        <div class="tagtimeline-scroll" id="tagTimelineScroll"></div>
    </div>

    <!-- ================================================================
    统计页 (三卡片)
    ================================================================ -->
    <div class="screen hidden" id="screen-stats">
        <div class="nav-bar">
            <button class="nav-back" id="statsBackBtn">←</button>
            <span class="nav-title">📊 统计</span>
            <span></span>
        </div>
        <div class="stats-scroll" id="statsScroll">
            <div class="stats-summary-row">
                <div class="stats-summary-card" id="statsCardToday" data-range="today">
                    <div class="summary-label">📅 今日</div>
                    <div class="summary-value" id="todayTotal">--</div>
                    <div class="summary-sub" id="todayCount">加载中…</div>
                    <div class="summary-hint">点击查看详情 →</div>
                </div>
                <div class="stats-summary-card" id="statsCardWeek" data-range="week">
                    <div class="summary-label">📅 本周</div>
                    <div class="summary-value" id="weekTotal">--</div>
                    <div class="summary-sub" id="weekCount">加载中…</div>
                    <div class="summary-hint">点击查看详情 →</div>
                </div>
                <div class="stats-summary-card" id="statsCardAll" data-range="all">
                    <div class="summary-label">📅 总计</div>
                    <div class="summary-value" id="allTotal">--</div>
                    <div class="summary-sub" id="allCount">加载中…</div>
                    <div class="summary-hint">点击查看详情 →</div>
                </div>
            </div>
            <div class="add-tag-row">
                <input type="text" id="manualTagInput" placeholder="添加新标签…" maxlength="20" />
                <button id="addManualTagBtn">添加</button>
            </div>
        </div>
    </div>

    <!-- ================================================================
    统计详情页 (竖直条形图)
    ================================================================ -->
    <div class="screen hidden" id="screen-stats-detail">
        <div class="nav-bar">
            <button class="nav-back" id="statsDetailBackBtn">←</button>
            <span class="nav-title" id="statsDetailTitle">今日详情</span>
            <span></span>
        </div>
        <div class="stats-detail-scroll" id="statsDetailScroll">
            <div class="stats-detail-header">
                <span class="title" id="detailRangeLabel">今日</span>
                <span class="sub" id="detailSubLabel">0 条记录 · 总时长 0h</span>
            </div>
            <div class="tag-bar-chart" id="tagBarChart">
                <div class="stats-empty">暂无数据</div>
            </div>
        </div>
    </div>

    <!-- ================================================================
    Bottom Sheet / Lightbox / Toast / Loading
    ================================================================ -->
    <div class="bottom-sheet-overlay" id="bottomSheetOverlay">
        <div class="bottom-sheet" id="bottomSheet">
            <div class="sheet-handle"></div>
            <div class="sheet-time" id="sheetTime"></div>
            <div class="sheet-text" id="sheetText"></div>
            <div class="sheet-tags-row" id="sheetTagsRow"></div>
            <div class="sheet-images" id="sheetImages"></div>
            <button class="sheet-delete-btn" id="sheetDeleteBtn">删除这条记录</button>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <img id="lightboxImg" src="" alt="" />
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        // ================================================================
        //  密码

        function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

        function todayKey() {
            const d = new Date();
            return dateKey(d.getFullYear(), d.getMonth(), d.getDate());
        }

        function getWeekStart() {
            const d = new Date();
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            const start = new Date(d);
            start.setDate(diff);
            start.setHours(0, 0, 0, 0);
            return start;
        }

        function formatTime(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        function fmtTime(ts) {
            const d = new Date(ts);
            return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function prettyDuration(minutes) {
            if (minutes < 1) return Math.round(minutes * 60) + '秒';
            if (minutes < 60) return Math.round(minutes) + '分';
            const h = Math.floor(minutes / 60);
            const m = Math.round(minutes % 60);
            return h + 'h' + (m > 0 ? m + 'm' : '');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function highlightKeywords(text) {
            const keywords = ['开心', '高兴', '兴奋', '激动', '幸福', '温暖', '感动', '难过', '失落', '疲惫', '累', '重要', '特别', '第一次',
                '终于', '梦', '梦境', '美好', '喜欢', '爱'
            ];
            let result = text;
            keywords.forEach(kw => {
                const regex = new RegExp(kw, 'g');
                result = result.replace(regex, `<span class="hl">${kw}</span>`);
            });
            return result;
        }

        async function fetchAllEntries() {
            if (firebaseReady && firebaseHelpers) {
                try {
                    const { collection, getDocs } = firebaseHelpers;
                    const snap = await getDocs(collection(db, 'entries'));
                    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
                } catch (e) { return localLoad(); }
            }
            return localLoad();
        }

        async function fetchEntriesForDate(dateStr) {
            if (cachedEntries[dateStr]) return cachedEntries[dateStr];
            let entries = [];
            if (firebaseReady && firebaseHelpers) {
                try {
                    const { collection, getDocs, query, where } = firebaseHelpers;
                    const q = query(collection(db, 'entries'), where('date', '==', dateStr));
                    const snap = await getDocs(q);
                    entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                } catch (e) { console.warn(e); }
            } else {
                entries = localLoad().filter(e => e.date === dateStr).sort((a, b) => a.ts - b.ts);
            }
            cachedEntries[dateStr] = entries;
            return entries;
        }

        async function fetchAllDates() {
            const result = {};
            if (firebaseReady && firebaseHelpers) {
                try {
                    const { collection, getDocs } = firebaseHelpers;
                    const snap = await getDocs(collection(db, 'entries'));
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (!result[data.date]) result[data.date] = { hasText: false, hasImg: false };
                        if (data.text) result[data.date].hasText = true;
                        if (data.images && data.images.length) result[data.date].hasImg = true;
                    });
                } catch (e) {}
            } else {
                localLoad().forEach(e => {
                    if (!result[e.date]) result[e.date] = { hasText: false, hasImg: false };
                    if (e.text) result[e.date].hasText = true;
                    if (e.images && e.images.length) result[e.date].hasImg = true;
                });
            }
            return result;
        }

        async function fetchAllTags() {
            if (allTagsCache) return allTagsCache;
            const byTag = {};

            function add(entry, dateStr) {
                (entry.tags || []).forEach(tag => {
                    if (!byTag[tag]) byTag[tag] = { tag, count: 0, lastTs: 0, entries: [] };
                    byTag[tag].count++;
                    byTag[tag].lastTs = Math.max(byTag[tag].lastTs, entry.ts);
                    byTag[tag].entries.push({ ...entry, date: dateStr });
                });
            }
            if (firebaseReady && firebaseHelpers) {
                try {
                    const { collection, getDocs } = firebaseHelpers;
                    const snap = await getDocs(collection(db, 'entries'));
                    snap.docs.forEach(d => add({ id: d.id, ...d.data() }, d.data().date));
                } catch (e) { console.warn(e); }
            } else {
                localLoad().forEach(e => add(e, e.date));
            }
            Object.values(byTag).forEach(t => t.entries.sort((a, b) => b.ts - a.ts));
            allTagsCache = Object.values(byTag).sort((a, b) => b.count - a.count);
            return allTagsCache;
        }

        async function fetchEntriesByTag(tag) {
            const all = await fetchAllTags();
            const found = all.find(t => t.tag === tag);
            return found ? found.entries : [];
        }

        async function uploadToCloudinary(file) {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', CLOUDINARY_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
                method: 'POST',
                body: fd
            });
            if (!res.ok) throw new Error('Cloudinary upload failed');
            const data = await res.json();
            return data.secure_url;
        }

        async function saveEntry(dateStr, text, images, tags, duration) {
            const ts = Date.now();
            const entry = { date: dateStr, ts, text, images: [], tags: tags || [], duration: duration || 0 };
            if (firebaseReady && firebaseHelpers) {
                try {
                    const urls = [];
                    for (const img of images) {
                        const url = await uploadToCloudinary(img.file);
                        urls.push(url);
                    }
                    entry.images = urls;
                    const { addDoc, collection } = firebaseHelpers;
                    const docRef = await addDoc(collection(db, 'entries'), {
                        date: dateStr,
                        ts,
                        text,
                        images: urls,
                        tags: tags || [],
                        duration: duration || 0
                    });
                    entry.id = docRef.id;
                } catch (e) {
                    console.warn('Save failed, falling back to local:', e);
                    entry.id = 'local_' + ts;
                    entry.images = images.map(i => i.dataUrl);
                    const all = localLoad();
                    all.push(entry);
                    localSave(all);
                }
            } else {
                entry.id = 'local_' + ts;
                entry.images = images.map(i => i.dataUrl);
                const all = localLoad();
                all.push(entry);
                localSave(all);
            }
            delete cachedEntries[dateStr];
            allTagsCache = null;
            return entry;
        }

        async function deleteEntry(entryId, dateStr) {
            if (firebaseReady && firebaseHelpers && !entryId.startsWith('local_')) {
                try {
                    const { deleteDoc, doc } = firebaseHelpers;
                    await deleteDoc(doc(db, 'entries', entryId));
                } catch (e) { console.warn(e); }
            } else {
                const all = localLoad().filter(e => e.id !== entryId);
                localSave(all);
            }
            delete cachedEntries[dateStr];
            allTagsCache = null;
        }

        async function importData(file) {
            showLoading();
            try {
                const text = await file.text();
                const entries = JSON.parse(text);
                if (!Array.isArray(entries) || entries.length === 0) throw new Error('无效的数据格式');
                if (firebaseReady && firebaseHelpers) {
                    let imported = 0;
                    const { addDoc, collection } = firebaseHelpers;
                    for (const entry of entries) {
                        try {
                            await addDoc(collection(db, 'entries'), {
                                date: entry.date,
                                ts: entry.ts,
                                text: entry.text || '',
                                images: entry.images || [],
                                tags: entry.tags || [],
                                duration: entry.duration || 0
                            });

                        } catch (e) { console.warn('导入单条失败:', e); }
                    }
                    toast(`✅ 导入了 ${imported} 条记录`);
                } else {
                    const existing = localLoad();
                    const newEntries = entries.filter(entry => {
                        return !existing.some(e => e.text === entry.text && Math.abs(e.ts - entry.ts) < 60000);
                    });
                    localSave([...existing, ...newEntries]);

                hideLoading();
                toast('❌ 导入失败: ' + e.message);
                console.error(e);
            }
        }

                container.innerHTML = `<li class="todo-empty">✨ 还没有任务</li>`;

            container.innerHTML = todos.map((t, idx) => `

                </li>
            `).join('');

            container.querySelectorAll('.todo-check').forEach(cb => {
                cb.addEventListener('change', function() {
                    const idx = parseInt(this.dataset.index);

                    todos[idx].done = this.checked;
                    saveTodos(todos);
                    renderTodos();
                });

                    renderTodos();
                });

            const todos = loadTodos();

            renderTodos();

        function renderCalendarGrid() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            document.getElementById('calYearLabel').textContent = currentYear;
            document.getElementById('calMonthLabel').textContent = MONTHS_ZH[currentMonth];

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevDays = new Date(currentYear, currentMonth, 0).getDate();
            const todayStr = todayKey();

            for (let i = firstDay - 1; i >= 0; i--) {
                grid.appendChild(makeDay(currentYear, currentMonth - 1, prevDays - i, true));
            }
            for (let d = 1; d <= daysInMonth; d++) {
                grid.appendChild(makeDay(currentYear, currentMonth, d, false));
            }
            const total = firstDay + daysInMonth;
            const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
            for (let d = 1; d <= rem; d++) {
                grid.appendChild(makeDay(currentYear, currentMonth + 1, d, true));
            }
        }

        function makeDay(year, month, day, otherMonth) {
            const dKey = dateKey(year, month, day);
            const isToday = dKey === todayKey();
            const meta = allDateMeta[dKey] || {};
            const isWeekend = [0, 6].includes(new Date(year, month, day).getDay());
            const hasRecord = meta.hasText || meta.hasImg;

            const cell = document.createElement('div');
            cell.className = 'cal-day' +
                (isToday ? ' today' : '') +
                (hasRecord ? ' has-record' : '') +
                (isWeekend ? ' weekend' : '') +
                (otherMonth ? ' other-month' : '');

            const circle = document.createElement('div');
            circle.className = 'day-circle';
            circle.textContent = day;

            const dot = document.createElement('div');
            dot.className = 'day-dot';

            cell.appendChild(circle);
            if (hasRecord || isToday) cell.appendChild(dot);

            if (!otherMonth) {
                cell.addEventListener('click', () => openDetail(dKey));
            }
            return cell;
        }

        // ================================================================
        //  周视图
        // ================================================================
        function getWeekRange(offset) {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            const base = new Date(now);
            base.setDate(now.getDate() + mondayOffset + offset * 7);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(base);
                d.setDate(base.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function getWeekNumber(d) {
            const start = new Date(d.getFullYear(), 0, 1);
            const diff = (d - start) / 86400000;
            return Math.ceil((diff + start.getDay() + 1) / 7);
        }

        async function renderStats() {
            const allEntries = await fetchAllEntries();

            const now = new Date();
            const todayStr = todayKey();
            const weekStart = getWeekStart();
            const weekStartStr = dateKey(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate());

            let todayMinutes = 0,
                todayCount = 0;
            let weekMinutes = 0,

            let allMinutes = 0,

                allMinutes += dur;
                allCount++;

                if (r.date === todayStr) {

                }
